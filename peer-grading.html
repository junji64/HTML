<!DOCTYPE html>
<html>
<body>

<h2>The output Element</h2>
<p>The output element represents the result of a calculation.</p>

<form action="/action_page.php"
oninput="x.value=parseInt(a1.value)+parseInt(a2.value)+parseInt(a3.value)">

  Setup (12) : <br> 
  <input type="number" size="2"  name="a1" value="0" min="0" max="3"> +
  <input type="number" size="2"  name="a2" value="0"  min="0" max="3"> +
  <input type="number" size="2"  name="a3" value="0"  min="0" max="3"> 
  =
  <output name="x" for="a1 a2 a3"></output>
</form>
<hr>
